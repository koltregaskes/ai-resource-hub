name: Update data (scrape + rebuild)

on:
  schedule:
    - cron: '12 * * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no data changes'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full hourly data refresh
        run: npm run scrape
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        timeout-minutes: 5

      - name: Build public cache
        run: npm run dump:pg
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Validate AI milestone seed
        run: npm run validate:milestones

      - name: Sync AI milestones staging tables
        run: npm run sync:milestones

      - name: Generate AI milestone export
        run: npm run generate:milestones

      - name: Generate public comparison exports
        run: npm run generate:spreadsheet

      - name: Generate release desk and editorial drafts
        run: npm run generate:release-desk

      - name: Generate regional availability export
        run: npm run generate:availability

      - name: Generate repo reference snapshots
        run: npm run generate:repo-reference

      - name: Run data staleness check
        run: npx tsx scripts/check-staleness.ts
        timeout-minutes: 1

      - name: Verify publish readiness
        run: npm run verify:publish
        timeout-minutes: 1

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet -- data/pg-cache data/provider-status.json public/data src/data/model-release-desk.generated.ts editorial/release-drafts docs/repo-reference || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true' || inputs.force_rebuild == 'true'
        run: |
          git config user.name "The AI Resource Hub Bot"
          git config user.email "bot@theairesourcehub.com"
          git add data/pg-cache data/provider-status.json public/data src/data/model-release-desk.generated.ts editorial/release-drafts docs/repo-reference
          git diff --staged --quiet || git commit -m "chore: update pricing & benchmark data $(date +%Y-%m-%d) [automated]"
          git push
